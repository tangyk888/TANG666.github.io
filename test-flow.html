<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统流程测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <h1 class="text-xl font-bold">系统流程测试</h1>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <!-- 测试卡片 -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4">OCR识别流程测试</h2>
            
            <!-- 测试步骤 -->
            <div class="space-y-6">
                <!-- 步骤1: 模拟OCR识别 -->
                <div>
                    <h3 class="text-sm font-medium text-gray-400 mb-2">步骤1: 模拟OCR识别</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 mb-2">输入测试编码</label>
                            <input type="text" id="testCodes" class="input" placeholder="输入多个编码，用逗号分隔，例如：12341-RNA-A01D51,12342-RNA-A02D52">
                        </div>
                        <button id="simulateOCRBtn" class="btn btn-primary">模拟OCR识别</button>
                    </div>
                </div>
                
                <!-- 步骤2: 编码处理 -->
                <div>
                    <h3 class="text-sm font-medium text-gray-400 mb-2">步骤2: 编码处理</h3>
                    <div id="codeProcessingResult" class="bg-gray-800 p-4 rounded-lg min-h-[100px]">
                        <p class="text-gray-400">点击模拟OCR识别后显示编码处理结果</p>
                    </div>
                </div>
                
                <!-- 步骤3: 真实接口查询 -->
                <div>
                    <h3 class="text-sm font-medium text-gray-400 mb-2">步骤3: 真实接口查询</h3>
                    <button id="queryLocationBtn" class="btn btn-secondary">查询仓位信息</button>
                </div>
                
                <!-- 步骤4: 结果展示 -->
                <div>
                    <h3 class="text-sm font-medium text-gray-400 mb-2">步骤4: 结果展示</h3>
                    <div id="queryResult" class="bg-gray-800 p-4 rounded-lg min-h-[200px]">
                        <p class="text-gray-400">点击查询仓位信息后显示结果</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 测试数据管理 -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4">测试数据管理</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-400 mb-2">添加测试数据</label>
                    <div class="space-y-2">
                        <input type="text" id="testCode" class="input" placeholder="编码">
                        <input type="text" id="testName" class="input" placeholder="名称">
                        <input type="text" id="testLocation" class="input" placeholder="仓位">
                        <button id="addTestDataBtn" class="btn btn-secondary">添加测试数据</button>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 mb-2">现有测试数据</label>
                    <div id="testDataList" class="bg-gray-800 p-4 rounded-lg min-h-[100px]">
                        <p class="text-gray-400">点击添加测试数据后显示</p>
                    </div>
                </div>
                <button id="clearTestDataBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">清空测试数据</button>
            </div>
        </div>
    </main>

    <script>
        // 模拟OCR识别
        document.getElementById('simulateOCRBtn').addEventListener('click', function() {
            const testCodes = document.getElementById('testCodes').value;
            if (!testCodes) {
                alert('请输入测试编码');
                return;
            }
            
            const codes = testCodes.split(',').map(code => code.trim()).filter(code => code);
            const codeProcessingResult = document.getElementById('codeProcessingResult');
            
            // 处理编码，提取前五位
            const processedCodes = codes.map(code => {
                const prefix = code.substring(0, 5);
                return {
                    fullCode: code,
                    prefix: prefix
                };
            });
            
            // 显示编码处理结果
            codeProcessingResult.innerHTML = `
                <div class="space-y-2">
                    <p class="text-green-400">✓ 编码处理完成</p>
                    <ul class="list-disc list-inside text-sm">
                        ${processedCodes.map(item => `<li>${item.fullCode} → 前五位: ${item.prefix}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            // 保存处理后的编码到本地存储，供后续查询使用
            localStorage.setItem('testOCRResult', JSON.stringify(codes));
        });
        
        // 查询仓位信息
        document.getElementById('queryLocationBtn').addEventListener('click', function() {
            const testOCRResult = localStorage.getItem('testOCRResult');
            if (!testOCRResult) {
                alert('请先模拟OCR识别');
                return;
            }
            
            const partCodes = JSON.parse(testOCRResult);
            const queryResult = document.getElementById('queryResult');
            
            // 模拟查询过程
            queryResult.innerHTML = '<p class="text-gray-400">正在查询仓位信息...</p>';
            
            setTimeout(() => {
                // 从本地存储获取仓位数据
                const warehouseData = localStorage.getItem('warehouseItems');
                let warehouseItems = [];
                
                if (warehouseData) {
                    warehouseItems = JSON.parse(warehouseData);
                }
                
                // 根据编码前缀查询匹配的仓位信息
                const results = partCodes.map((fullCode, index) => {
                    const prefix = fullCode.substring(0, 5);
                    
                    // 查找匹配的仓位数据
                    const matchedItem = warehouseItems.find(item => 
                        item.code && item.code.startsWith(prefix)
                    );
                    
                    if (matchedItem) {
                        return {
                            codePrefix: prefix,
                            fullCode: fullCode,
                            name: matchedItem.name || `配件${prefix}`,
                            location: matchedItem.location || `仓位${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}
                        };
                    } else {
                        // 如果没有匹配的数据，返回基本信息
                        return {
                            codePrefix: prefix,
                            fullCode: fullCode,
                            name: `配件${prefix}`,
                            location: `仓位${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}
                        };
                    }
                });
                
                // 显示查询结果
                queryResult.innerHTML = `
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-gray-700">
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">编码前五位</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">完整编码</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">配件名称</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">仓位信息</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${results.map(item => `
                                    <tr class="border-b border-gray-700 hover:bg-gray-800">
                                        <td class="py-2 px-3">${item.codePrefix}</td>
                                        <td class="py-2 px-3">${item.fullCode}</td>
                                        <td class="py-2 px-3">${item.name}</td>
                                        <td class="py-2 px-3">${item.location}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }, 500);
        });
        
        // 添加测试数据
        document.getElementById('addTestDataBtn').addEventListener('click', function() {
            const code = document.getElementById('testCode').value;
            const name = document.getElementById('testName').value;
            const location = document.getElementById('testLocation').value;
            
            if (!code || !name || !location) {
                alert('请填写完整的测试数据');
                return;
            }
            
            // 从本地存储获取现有数据
            const warehouseData = localStorage.getItem('warehouseItems');
            let warehouseItems = [];
            
            if (warehouseData) {
                warehouseItems = JSON.parse(warehouseData);
            }
            
            // 添加新数据
            warehouseItems.push({
                code: code,
                name: name,
                location: location
            });
            
            // 保存回本地存储
            localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
            
            // 更新测试数据列表
            updateTestDataList();
            
            // 清空输入框
            document.getElementById('testCode').value = '';
            document.getElementById('testName').value = '';
            document.getElementById('testLocation').value = '';
            
            alert('测试数据添加成功');
        });
        
        // 清空测试数据
        document.getElementById('clearTestDataBtn').addEventListener('click', function() {
            if (confirm('确定要清空所有测试数据吗？')) {
                localStorage.removeItem('warehouseItems');
                updateTestDataList();
                alert('测试数据已清空');
            }
        });
        
        // 更新测试数据列表
        function updateTestDataList() {
            const testDataList = document.getElementById('testDataList');
            
            // 从本地存储获取数据
            const warehouseData = localStorage.getItem('warehouseItems');
            let warehouseItems = [];
            
            if (warehouseData) {
                warehouseItems = JSON.parse(warehouseData);
            }
            
            if (warehouseItems.length === 0) {
                testDataList.innerHTML = '<p class="text-gray-400">暂无测试数据</p>';
            } else {
                testDataList.innerHTML = `
                    <ul class="list-disc list-inside text-sm space-y-1">
                        ${warehouseItems.map(item => `<li>${item.code} - ${item.name} - ${item.location}</li>`).join('')}
                    </ul>
                `;
            }
        }
        
        // 页面加载时更新测试数据列表
        window.addEventListener('load', function() {
            updateTestDataList();
        });
    </script>
</body>
</html>
