<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-white rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .input {
                @apply w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-lg;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="card">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-dark">仓库仓位查询系统</h1>
                <p class="text-gray-600 mt-2">请登录以继续</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">用户名</label>
                    <input type="text" id="username" class="input" required>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">密码</label>
                    <input type="password" id="password" class="input" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">登录</button>
            </form>
        </div>
    </div>
    <script>
        // 初始化默认用户
        if (!localStorage.getItem('users')) {
            const defaultUsers = [
                { id: 1, username: 'admin', password: 'admin123', role: 'admin' },
                { id: 2, username: 'user', password: 'user123', role: 'user' }
            ];
            localStorage.setItem('users', JSON.stringify(defaultUsers));
        }

        // 初始化仓位数据
        if (!localStorage.getItem('warehouseItems')) {
            const defaultItems = [];
            localStorage.setItem('warehouseItems', JSON.stringify(defaultItems));
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        });
    </script>
</body>
</html>
