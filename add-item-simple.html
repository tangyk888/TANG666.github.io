<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 仓位录入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">仓位录入</h1>
        </div>

        <!-- 录入表单 -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4">添加仓位</h2>
            <form id="manualForm" class="space-y-4">
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">仓位</label>
                    <input type="text" id="location" class="input" placeholder="输入仓位">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">编码</label>
                    <input type="text" id="code" class="input" placeholder="输入编码">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">名称</label>
                    <input type="text" id="name" class="input" placeholder="输入名称">
                </div>
                <div>
                    <button type="submit" class="btn btn-primary w-full">
                        <i class="fa fa-plus mr-2"></i>添加
                    </button>
                </div>
            </form>
        </div>

        <!-- 仓位列表 -->
        <div class="card">
            <h2 class="text-lg font-semibold mb-4">已录入仓位</h2>
            <div class="overflow-x-auto bg-gray-900 rounded-b-lg">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="py-3 px-4 text-left text-sm text-gray-400">仓位</th>
                            <th class="py-3 px-4 text-left text-sm text-gray-400">编码</th>
                            <th class="py-3 px-4 text-left text-sm text-gray-400">名称</th>
                            <th class="py-3 px-4 text-right text-sm text-gray-400">操作</th>
                        </tr>
                    </thead>
                    <tbody id="itemTableBody">
                        <!-- 表格内容将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 页面加载完成后加载数据
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始加载数据');
            loadItems();
        });

        // 加载仓位数据
        function loadItems() {
            // 手动添加测试数据，确保表格有内容
            const testItems = [
                { location: 'A1', code: '001', name: '测试仓位1' },
                { location: 'A2', code: '002', name: '测试仓位2' },
                { location: 'A3', code: '003', name: '测试仓位3' }
            ];
            localStorage.setItem('warehouseItems', JSON.stringify(testItems));
            
            // 获取表格体元素
            const tableBody = document.getElementById('itemTableBody');
            if (!tableBody) {
                console.error('找不到itemTableBody元素');
                return;
            }
            
            // 清空表格
            tableBody.innerHTML = '';
            
            // 从localStorage获取数据
            const updatedItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            
            console.log('加载数据:', updatedItems);
            
            // 显示数据
            if (updatedItems.length === 0) {
                // 显示空状态
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `
                    <td colspan="4" class="py-8 text-center text-gray-400">
                        <i class="fa fa-folder-open text-4xl mb-2"></i>
                        <p>暂无已录入的仓位</p>
                    </td>
                `;
                tableBody.appendChild(emptyRow);
            } else {
                // 显示数据
                updatedItems.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.className = 'border-b border-gray-700 hover:bg-gray-800';
                    row.innerHTML = `
                        <td class="py-3 px-4">${item.location || '-'}</td>
                        <td class="py-3 px-4">${item.code || '-'}</td>
                        <td class="py-3 px-4">${item.name || '-'}</td>
                        <td class="py-3 px-4 flex justify-end space-x-3">
                            <button class="text-primary hover:underline"><i class="fa fa-eye"></i></button>
                            <button class="text-danger hover:underline"><i class="fa fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // 手动录入表单提交
        document.getElementById('manualForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const location = document.getElementById('location').value;
            const code = document.getElementById('code').value;
            const name = document.getElementById('name').value;
            
            saveItem(location, code, name);
        });

        // 保存项目
        function saveItem(location, code, name) {
            // 从localStorage获取数据
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            
            // 创建新的仓位对象
            const newItem = {
                location: location,
                code: code,
                name: name
            };
            
            // 添加到数组
            warehouseItems.push(newItem);
            
            // 保存到localStorage
            localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
            console.log('保存成功，数据：', warehouseItems);
            
            // 清空表单
            document.getElementById('location').value = '';
            document.getElementById('code').value = '';
            document.getElementById('name').value = '';
            
            // 重新加载列表
            loadItems();
        }
    </script>
</body>
</html>
