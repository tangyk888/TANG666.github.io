<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>仓位管理系统</title>
<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{margin:0;background:#f4f5f7;padding:8px}

/* 登录 */
#loginWrapper{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{width:90%;max-width:380px;padding:30px;border-radius:16px;background:#f9fafb;text-align:center}
.login-box h3{margin-bottom:20px;color:#1e293b}
.login-input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #cbd5e1;margin-bottom:12px;outline:none;font-size:16px}
.login-btn{width:100%;padding:12px;border-radius:12px;background:#2563eb;color:white;border:none;font-size:16px;margin-bottom:8px;cursor:pointer}
.gray-btn{background:#64748b}

/* 弹窗 */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:99999}
.modal-body{background:#fff;border-radius:16px;width:90%;max-width:400px;padding:24px;max-height:80vh;overflow-y:auto}
.modal-body h4{margin-top:0;margin-bottom:16px}
.user-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
.del-user{color:#ef4444;font-size:14px;cursor:pointer}

/* 主界面 */
.app-container{width:100%;max-width:1200px;background:white;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08);overflow:hidden;display:none;margin:0 auto}
.status-bar {
    background: #fefefe;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e2e6ea;
    font-size: 15px;
    font-weight: 500;
    color: #1e293b;
}
.title-scan-group {
    display: flex;
    align-items: center;
    gap: 12px;
}
.scan-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #2563eb;
    color: white;
    border: none;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.scan-icon-btn:active {
    transform: scale(0.95);
}
.add-row-btn {
    background: #10b981;
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
}
.del-row-btn {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
}
.import-btn {
    background: #0ea5e9;
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
}
.export-btn {
    background: #f59e0b;
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
}
.user-btn {
    background: #8b5cf6;
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
}
.search-bar{padding:12px 20px;border-bottom:1px solid #e2e6ea}
.search-input{width:100%;padding:10px 16px;border-radius:12px;border:1px solid #cbd5e1;outline:none;font-size:16px}

.table-wrapper{padding:16px 20px;background:white;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:white;border-radius:18px;font-size:15px;min-width:500px}
th{background:#f7f9fc;font-weight:600;color:#1e2a3a;border-bottom:2px solid #cdd9e9;padding:14px 8px;text-align:left;border-right:1px solid #e2e8f0}
td{padding:12px 8px;border-bottom:1px solid #e9edf3;border-right:1px solid #eef2f6;color:#1f2a41;vertical-align:middle}
th:last-child, td:last-child { border-right: none; }
.col-sub { font-size: 12px; color: #64748b; margin-left: 6px; }

#scanner-container {
    width: 100%;
    max-width: 500px;
    margin: 0 auto 16px auto;
    display: none;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #2563eb;
}
#scanner-video {
    width: 100%;
    height: auto;
    display: block;
}
.close-scanner {
    background: #ef4444;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 8px;
}

.file-input{display:none}
</style>
</head>

<body>

<!-- 登录 -->
<div id="loginWrapper">
  <div class="login-box">
    <h3>仓位管理登录</h3>
    <input class="login-input" id="loginUser" placeholder="用户名" type="text">
    <input class="login-input" id="loginPwd" placeholder="密码" type="password">
    <button class="login-btn" onclick="login()">登录</button>
  </div>
</div>

<!-- 用户管理 -->
<div class="modal" id="userModal">
  <div class="modal-body">
    <h4>用户管理</h4>
    <div id="userList"></div>
    <hr style="margin:16px 0">
    <input class="login-input" id="newUserName" placeholder="用户名">
    <input class="login-input" id="newUserPwd" placeholder="密码">
    <button class="login-btn" onclick="addUser()">添加用户</button>
    <button class="login-btn gray-btn" style="margin-top:8px" onclick="closeUserModal()">关闭</button>
  </div>
</div>

<!-- 主界面 -->
<div class="app-container" id="mainApp">
    <div class="status-bar">
        <div class="title-scan-group">
            <span style="color:#1e293b;">📦 仓位扫码管理</span>
            <button class="scan-icon-btn" id="headerScanBtn">📷</button>
            <button class="add-row-btn" id="addRowBtn">＋</button>
            <button class="del-row-btn" id="delRowBtn">−</button>
            <button class="import-btn" onclick="document.getElementById('fileInput').click()">📥</button>
            <button class="export-btn" onclick="exportExcel()">📤</button>
            <button class="user-btn" onclick="showUserManage()">👤</button>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索仓位、编码、名称">
        <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv" onchange="importExcel(event)">
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
            <tr>
                <th>A <span class="col-sub">仓位</span></th>
                <th>B <span class="col-sub">编码</span></th>
                <th>C <span class="col-sub">名称</span></th>
                <th>D</th>
                <th>E</th>
                <th>F</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div id="scanner-container">
        <video id="scanner-video" autoplay playsinline></video>
        <div style="display: flex; gap: 8px; padding: 8px; background: white;">
            <button id="closeScannerBtn" class="close-scanner">关闭摄像头</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ====================== 用户系统 ======================
let currentUser = null;
const ADMIN_USERNAME = "1329923942@qq.com";
const ADMIN_PASSWORD = "18802595319Xx";

function initUsers() {
  if (!localStorage.getItem("users")) {
    const users = [{ username: ADMIN_USERNAME, password: ADMIN_PASSWORD, role: "admin" }];
    localStorage.setItem("users", JSON.stringify(users));
  }
}
initUsers();

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}
function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function login() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPwd").value.trim();
  const users = getUsers();
  const u = users.find(x => x.username === username && x.password === password);
  if (!u) return alert("账号或密码错误");
  currentUser = u;
  document.getElementById("loginWrapper").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  loadData();
}

function showUserManage() {
  if (!currentUser || currentUser.role !== "admin") {
    alert("仅管理员可操作");
    return;
  }
  document.getElementById("userModal").style.display = "flex";
  renderUserList();
}
function closeUserModal() {
  document.getElementById("userModal").style.display = "none";
}
function renderUserList() {
  const users = getUsers();
  let html = "";
  users.forEach(u => {
    html += `
    <div class="user-item">
      <div>${u.username} (${u.role||"user"})</div>
      ${u.username !== ADMIN_USERNAME ? '<div class="del-user" onclick="delUser(\''+u.username+'\')">删除</div>' : ''}
    </div>`;
  });
  document.getElementById("userList").innerHTML = html;
}
function addUser() {
  const username = document.getElementById("newUserName").value.trim();
  const password = document.getElementById("newUserPwd").value.trim();
  if (!username || !password) return alert("请输入用户名和密码");
  const users = getUsers();
  if (users.some(x => x.username === username)) return alert("用户名已存在");
  users.push({ username, password, role: "user" });
  saveUsers(users);
  renderUserList();
  document.getElementById("newUserName").value = "";
  document.getElementById("newUserPwd").value = "";
}
function delUser(username) {
  if (username === ADMIN_USERNAME) return alert("不能删除管理员");
  if (!confirm("确定删除？")) return;
  let users = getUsers();
  users = users.filter(x => x.username !== username);
  saveUsers(users);
  renderUserList();
}

// ====================== 表格与扫码 ======================
let tableData = [];
const tbody = document.getElementById('tableBody');
const headerScanBtn = document.getElementById('headerScanBtn');
const addRowBtn = document.getElementById('addRowBtn');
const delRowBtn = document.getElementById('delRowBtn');
const closeScannerBtn = document.getElementById('closeScannerBtn');
const scannerContainer = document.getElementById('scanner-container');
const scannerVideo = document.getElementById('scanner-video');
const searchInput = document.getElementById('searchInput');

let stream = null;
let scanning = false;

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function renderTable() {
    let html = '';
    tableData.forEach((row, r) => {
        html += '<tr>';
        for (let c = 0; c < 6; c++) {
            const val = row[c] || '';
            html += `<td contenteditable data-row="${r}" data-col="${c}">${escapeHtml(val)}</td>`;
        }
        html += '</tr>';
    });
    tbody.innerHTML = html;
}

function attachCellEvents() {
    tbody.querySelectorAll('td').forEach(cell => {
        cell.addEventListener('input', function() {
            const r = +this.dataset.row;
            const c = +this.dataset.col;
            if (tableData[r]) tableData[r][c] = this.innerText;
            saveData();
        });
    });
}

function refresh() {
    renderTable();
    attachCellEvents();
}

// 扫码规则与你提供的代码完全一致
function parseQr(s) {
    if (!s) return null;
    const loc = s.match(/仓位[：:]?\s*(\S+)/);
    const id  = s.match(/编码[：:]?\s*(\S+)/);
    const name = s.match(/名称[：:]?\s*(\S+)/);
    return {
        location: loc ? loc[1] : '',
        code: id ? id[1] : '',
        name: name ? name[1] : ''
    };
}

function addEmptyRow() {
    tableData.push(['', '', '', '', '', '']);
    saveData();
    refresh();
}

function deleteLastRow() {
    if (tableData.length === 0) return;
    if (!confirm("确定删除最后一行？")) return;
    tableData.pop();
    saveData();
    refresh();
}

function addRow(data) {
    tableData.push([
        data.location,
        data.code,
        data.name,
        '', '', ''
    ]);
    saveData();
    refresh();
}

function handleScan(text) {
    const d = parseQr(text);
    if (!d) return;
    addRow(d);
}

async function startScanner() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        });
        scannerVideo.srcObject = stream;
        scannerContainer.style.display = 'block';
        scanning = true;
        scannerVideo.onloadedmetadata = scanLoop;
    } catch (e) {
        alert('摄像头权限失败');
        scannerContainer.style.display = 'none';
    }
}

function scanLoop() {
    if (!scanning) return;
    const w = scannerVideo.videoWidth;
    const h = scannerVideo.videoHeight;
    if (!w || !h) return requestAnimationFrame(scanLoop);

    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(scannerVideo, 0,0,w,h);
    const code = jsQR(ctx.getImageData(0,0,w,h).data, w,h);
    if (code && code.data) {
        stopScanner();
        handleScan(code.data.trim());
        return;
    }
    requestAnimationFrame(scanLoop);
}

function stopScanner() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    scannerContainer.style.display = 'none';
    scanning = false;
}

// 搜索
searchInput.addEventListener('input', () => {
    const kw = searchInput.value.toLowerCase().trim();
    tbody.querySelectorAll('tr').forEach((tr, i) => {
        const t = tableData[i];
        if (!t) return;
        const txt = (t[0]+' '+t[1]+' '+t[2]).toLowerCase();
        tr.style.display = !kw || txt.includes(kw) ? '' : 'none';
    });
});

// Excel
function importExcel(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        const wb = XLSX.read(ev.target.result, { type: 'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const arr = XLSX.utils.sheet_to_json(ws, { header: 1 });
        arr.shift();
        tableData = arr.filter(r=>r.length>0).map(r=>[
            r[0]||"",r[1]||"",r[2]||"",r[3]||"",r[4]||"",r[5]||""
        ]);
        saveData();
        refresh();
        alert("导入成功");
    };
    reader.readAsBinaryString(file);
}

function exportExcel() {
    const ws = XLSX.utils.aoa_to_sheet([["仓位","编码","名称","D","E","F"],...tableData]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "仓位数据");
    XLSX.writeFile(wb, "仓位数据.xlsx");
}

function saveData() {
    localStorage.setItem("tableData", JSON.stringify(tableData));
}

function loadData() {
    tableData = JSON.parse(localStorage.getItem("tableData") || "[]");
    if (tableData.length === 0) {
        tableData = [['A-1','12345','前杠','','','']];
    }
    refresh();
}

headerScanBtn.addEventListener('click', startScanner);
closeScannerBtn.addEventListener('click', stopScanner);
addRowBtn.addEventListener('click', addEmptyRow);
delRowBtn.addEventListener('click', deleteLastRow);
</script>
</body>
</html>
