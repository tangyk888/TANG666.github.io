<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 系统设置</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#06b6d4',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <!-- 返回按钮 -->
                    <button id="backButton" class="p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-arrow-left"></i>
                    </button>
                    
                    <!-- 标题 -->
                    <h1 class="ml-4 text-xl font-semibold text-gray-800">系统设置</h1>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- 设置卡片 -->
        <div class="bg-white rounded-lg shadow-card p-6 mb-6">
            <h2 class="text-lg font-medium text-gray-800 mb-4">二维码格式设置</h2>
            
            <form id="settingsForm" class="space-y-4">
                <div>
                    <label for="qrCodeFormat" class="block text-sm font-medium text-gray-700 mb-1">二维码数据格式</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-code"></i>
                        </span>
                        <input type="text" id="qrCodeFormat" name="qrCodeFormat" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all-300" placeholder="请输入字段格式，用逗号分隔" value="position,code,name" required>
                    </div>
                    <p class="mt-1 text-xs text-gray-500">示例：position,code,name 表示二维码内容格式为"仓位,编码,名称"</p>
                </div>
                
                <div>
                    <label for="delimiter" class="block text-sm font-medium text-gray-700 mb-1">字段分隔符</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-minus"></i>
                        </span>
                        <input type="text" id="delimiter" name="delimiter" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all-300" placeholder="请输入分隔符" value="," required>
                    </div>
                    <p class="mt-1 text-xs text-gray-500">用于分隔二维码中的不同字段，默认为逗号</p>
                </div>
                
                <div class="flex items-center">
                    <input id="autoSave" name="autoSave" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" checked>
                    <label for="autoSave" class="ml-2 block text-sm text-gray-700">自动保存数据</label>
                </div>
                
                <div class="pt-4 border-t border-gray-200">
                    <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-save mr-2"></i>
                        保存设置
                    </button>
                    
                    <button type="button" id="resetDefaultsButton" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300 ml-2">
                        <i class="fa fa-refresh mr-2"></i>
                        恢复默认
                    </button>
                </div>
            </form>
        </div>
        
        <!-- 数据管理卡片 -->
        <div class="bg-white rounded-lg shadow-card p-6 mb-6">
            <h2 class="text-lg font-medium text-gray-800 mb-4">数据管理</h2>
            
            <div class="space-y-4">
                <div>
                    <h3 class="text-md font-medium text-gray-700 mb-2">数据导出</h3>
                    <button id="exportDataButton" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-download mr-2"></i>
                        导出所有数据
                    </button>
                    <p class="mt-1 text-xs text-gray-500">将所有仓位数据导出为JSON文件</p>
                </div>
                
                <div>
                    <h3 class="text-md font-medium text-gray-700 mb-2">数据导入</h3>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg">
                        <div class="space-y-1 text-center">
                            <i class="fa fa-upload text-gray-400 text-3xl"></i>
                            <div class="flex text-sm text-gray-600">
                                <label for="importFile" class="relative cursor-pointer bg-white rounded-md font-medium text-primary hover:text-primary-dark focus-within:outline-none">
                                    <span>选择文件</span>
                                    <input id="importFile" name="importFile" type="file" class="sr-only" accept=".json">
                                </label>
                                <p class="pl-1">或拖放文件到此处</p>
                            </div>
                            <p class="text-xs text-gray-500">
                                支持JSON格式文件
                            </p>
                        </div>
                    </div>
                </div>
                
                <div class="pt-4 border-t border-gray-200">
                    <button id="clearDataButton" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all-300">
                        <i class="fa fa-trash mr-2"></i>
                        清空所有数据
                    </button>
                    <p class="mt-1 text-xs text-red-500">警告：此操作将删除所有仓位数据，无法恢复！</p>
                </div>
            </div>
        </div>
        
        <!-- 系统信息卡片 -->
        <div class="bg-white rounded-lg shadow-card p-6">
            <h2 class="text-lg font-medium text-gray-800 mb-4">系统信息</h2>
            
            <div class="space-y-2">
                <div class="flex justify-between">
                    <span class="text-sm text-gray-600">系统版本</span>
                    <span class="text-sm font-medium text-gray-900">1.0.0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-gray-600">数据存储位置</span>
                    <span class="text-sm font-medium text-gray-900">本地存储 (localStorage)</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-gray-600">浏览器要求</span>
                    <span class="text-sm font-medium text-gray-900">支持 HTML5 和 ES6</span>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 确认清空数据弹窗 -->
    <div id="confirmClearModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
            <div class="p-4 bg-red-100 border-b border-red-200">
                <h3 class="text-lg font-medium text-red-800">确认清空数据</h3>
            </div>
            
            <div class="p-6">
                <div class="flex items-center justify-center mb-4">
                    <i class="fa fa-exclamation-triangle text-red-500 text-4xl"></i>
                </div>
                <p class="text-gray-700 text-center">确定要清空所有仓位数据吗？</p>
                <p class="text-sm text-gray-500 mt-2 text-center">此操作无法撤销，所有数据将被永久删除！</p>
                
                <div class="mt-4">
                    <label for="confirmText" class="block text-sm font-medium text-gray-700 mb-1">请输入 "CONFIRM" 确认</label>
                    <input type="text" id="confirmText" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all-300">
                </div>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-end">
                <button id="cancelClearButton" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300 mr-2">
                    取消
                </button>
                <button id="confirmClearButton" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all-300" disabled>
                    确认清空
                </button>
            </div>
        </div>
    </div>
    
    <!-- 操作结果提示 -->
    <div id="operationToast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-white rounded-lg shadow-lg p-4 max-w-md hidden">
        <div class="flex items-center">
            <div class="flex-shrink-0">
                <i id="operationIcon" class="fa fa-check-circle text-green-500 text-xl"></i>
            </div>
            <div class="ml-3">
                <h4 id="operationTitle" class="text-sm font-medium text-gray-900">操作成功</h4>
                <p id="operationMessage" class="text-sm text-gray-500 mt-1">设置已保存</p>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        function checkLoginStatus() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (!currentUser) {
                // 重定向到登录页面
                window.location.href = 'index.html';
                return false;
            }
            
            // 检查是否是管理员
            const userInfo = JSON.parse(currentUser);
            if (userInfo.role !== 'admin') {
                // 非管理员重定向到查询页面
                window.location.href = 'search.html';
                return false;
            }
            
            return true;
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!checkLoginStatus()) {
                return;
            }
            
            // 返回按钮点击事件
            document.getElementById('backButton').addEventListener('click', function() {
                window.location.href = 'search.html';
            });
            
            // 设置表单提交事件
            document.getElementById('settingsForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveSettings();
            });
            
            // 恢复默认按钮点击事件
            document.getElementById('resetDefaultsButton').addEventListener('click', function() {
                resetDefaults();
            });
            
            // 导出数据按钮点击事件
            document.getElementById('exportDataButton').addEventListener('click', function() {
                exportData();
            });
            
            // 导入文件选择事件
            document.getElementById('importFile').addEventListener('change', function(e) {
                handleFileImport(e.target.files[0]);
            });
            
            // 清空数据按钮点击事件
            document.getElementById('clearDataButton').addEventListener('click', function() {
                showConfirmClearModal();
            });
            
            // 确认清空弹窗相关事件
            document.getElementById('cancelClearButton').addEventListener('click', function() {
                document.getElementById('confirmClearModal').classList.add('hidden');
            });
            
            document.getElementById('confirmClearButton').addEventListener('click', function() {
                confirmClearData();
            });
            
            // 确认文本输入事件
            document.getElementById('confirmText').addEventListener('input', function() {
                const confirmButton = document.getElementById('confirmClearButton');
                confirmButton.disabled = this.value.toUpperCase() !== 'CONFIRM';
            });
            
            // 点击弹窗外部关闭弹窗
            document.getElementById('confirmClearModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                }
            });
            
            // 加载设置
            loadSettings();
        });
        
        // 加载设置
        function loadSettings() {
            // 获取系统设置
            const settings = JSON.parse(localStorage.getItem('warehouseSettings')) || {
                qrCodeFormat: 'position,code,name',
                delimiter: ',',
                autoSave: true
            };
            
            // 填充表单
            document.getElementById('qrCodeFormat').value = settings.qrCodeFormat || 'position,code,name';
            document.getElementById('delimiter').value = settings.delimiter || ',';
            document.getElementById('autoSave').checked = settings.autoSave !== false;
        }
        
        // 保存设置
        function saveSettings() {
            // 获取表单数据
            const qrCodeFormat = document.getElementById('qrCodeFormat').value.trim();
            const delimiter = document.getElementById('delimiter').value.trim();
            const autoSave = document.getElementById('autoSave').checked;
            
            // 验证必填字段
            if (!qrCodeFormat || !delimiter) {
                showOperationResult('error', '保存失败', '请填写所有必填字段');
                return;
            }
            
            // 创建设置对象
            const settings = {
                qrCodeFormat: qrCodeFormat,
                delimiter: delimiter,
                autoSave: autoSave
            };
            
            // 保存到本地存储
            localStorage.setItem('warehouseSettings', JSON.stringify(settings));
            
            showOperationResult('success', '保存成功', '设置已保存');
        }
        
        // 恢复默认设置
        function resetDefaults() {
            // 默认设置
            const defaultSettings = {
                qrCodeFormat: 'position,code,name',
                delimiter: ',',
                autoSave: true
            };
            
            // 填充表单
            document.getElementById('qrCodeFormat').value = defaultSettings.qrCodeFormat;
            document.getElementById('delimiter').value = defaultSettings.delimiter;
            document.getElementById('autoSave').checked = defaultSettings.autoSave;
            
            showOperationResult('info', '已恢复默认设置', '请点击保存以应用');
        }
        
        // 导出数据
        function exportData() {
            // 获取仓位数据
            const positions = JSON.parse(localStorage.getItem('warehousePositions')) || [];
            
            // 创建导出数据
            const exportData = {
                version: '1.0.0',
                exportDate: new Date().toISOString(),
                positions: positions
            };
            
            // 转换为JSON字符串
            const jsonString = JSON.stringify(exportData, null, 2);
            
            // 创建Blob对象
            const blob = new Blob([jsonString], { type: 'application/json' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `warehouse-data-${formatDate(new Date())}.json`;
            
            // 触发下载
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
            
            showOperationResult('success', '导出成功', `已导出 ${positions.length} 条数据`);
        }
        
        // 处理文件导入
        function handleFileImport(file) {
            if (!file) {
                return;
            }
            
            // 验证文件类型
            if (file.type !== 'application/json' && !file.name.endsWith('.json')) {
                showOperationResult('error', '导入失败', '请选择JSON格式文件');
                return;
            }
            
            // 读取文件
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // 解析JSON
                    const importData = JSON.parse(e.target.result);
                    
                    // 验证数据格式
                    if (!importData.positions || !Array.isArray(importData.positions)) {
                        showOperationResult('error', '导入失败', '无效的数据格式');
                        return;
                    }
                    
                    // 确认导入
                    if (confirm(`确定要导入 ${importData.positions.length} 条数据吗？这将覆盖现有数据。`)) {
                        // 保存数据
                        localStorage.setItem('warehousePositions', JSON.stringify(importData.positions));
                        showOperationResult('success', '导入成功', `已导入 ${importData.positions.length} 条数据`);
                    }
                } catch (error) {
                    console.error('解析JSON文件失败:', error);
                    showOperationResult('error', '导入失败', '无法解析JSON文件');
                }
            };
            reader.readAsText(file);
        }
        
        // 显示确认清空弹窗
        function showConfirmClearModal() {
            const modal = document.getElementById('confirmClearModal');
            const confirmText = document.getElementById('confirmText');
            const confirmButton = document.getElementById('confirmClearButton');
            
            // 重置输入
            confirmText.value = '';
            confirmButton.disabled = true;
            
            // 显示弹窗
            modal.classList.remove('hidden');
        }
        
        // 确认清空数据
        function confirmClearData() {
            const confirmText = document.getElementById('confirmText');
            
            // 验证确认文本
            if (confirmText.value.toUpperCase() !== 'CONFIRM') {
                return;
            }
            
            // 清空数据
            localStorage.removeItem('warehousePositions');
            
            // 隐藏弹窗
            document.getElementById('confirmClearModal').classList.add('hidden');
            
            showOperationResult('success', '清空成功', '所有数据已清空');
        }
        
        // 显示操作结果提示
        function showOperationResult(type, title, message) {
            const toast = document.getElementById('operationToast');
            const icon = document.getElementById('operationIcon');
            const titleElement = document.getElementById('operationTitle');
            const messageElement = document.getElementById('operationMessage');
            
            // 设置图标和颜色
            if (type === 'success') {
                icon.className = 'fa fa-check-circle text-green-500 text-xl';
            } else if (type === 'error') {
                icon.className = 'fa fa-exclamation-circle text-red-500 text-xl';
            } else {
                icon.className = 'fa fa-info-circle text-blue-500 text-xl';
            }
            
            // 设置标题和消息
            titleElement.textContent = title;
            messageElement.textContent = message;
            
            // 显示提示
            toast.classList.remove('hidden');
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
        
        // 格式化日期
        function formatDate(date) {
            return `${date.getFullYear()}${padZero(date.getMonth() + 1)}${padZero(date.getDate())}`;
        }
        
        // 数字补零
        function padZero(num) {
            return num.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
