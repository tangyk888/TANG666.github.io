<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 仓位录入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-white rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-lg;
            }
            .table {
                @apply w-full border-collapse;
            }
            .table th {
                @apply bg-gray-100 border py-3 px-4 text-left text-sm;
            }
            .table td {
                @apply border py-3 px-4 text-sm;
            }
            .table tr:hover {
                @apply bg-gray-50;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3 flex items-center">
            <button id="backBtn" class="mr-4 text-gray-600 hover:text-primary">
                <i class="fa fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-xl font-bold text-dark">仓位录入</h1>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 录入表单 -->
        <div class="card mb-6">
            <h2 class="text-lg font-semibold mb-4">仓位录入</h2>
            <form id="manualForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">仓位</label>
                    <input type="text" id="location" class="input" placeholder="输入仓位">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">编码</label>
                    <input type="text" id="code" class="input" placeholder="输入编码">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">名称</label>
                    <input type="text" id="name" class="input" placeholder="输入名称">
                </div>
                <div>
                        <label class="block text-gray-700 mb-2">图片</label>
                        <input type="file" id="image" class="input" accept="image/*" capture="camera" multiple>
                    </div>
                <div class="flex space-x-4">
                    <button type="submit" class="btn btn-primary flex-1">
                        <i class="fa fa-plus mr-2"></i>添加
                    </button>
                    <button type="button" id="scanQrBtn" class="btn btn-secondary flex-1">
                        <i class="fa fa-qrcode mr-2"></i>扫码录入
                    </button>
                </div>
            </form>
            <div id="qrScanArea" class="hidden mt-4">
                <video id="qrVideo" class="w-full border rounded-md mb-4"></video>
                <button id="stopQrScanBtn" class="btn btn-primary">
                    <i class="fa fa-stop mr-2"></i>停止扫码
                </button>
                <p class="text-sm text-gray-600 mt-4">二维码格式：仓位|编码|名称</p>
            </div>
        </div>

        <!-- 仓位列表 -->
        <div class="card">
            <h2 class="text-lg font-semibold mb-4">仓位列表</h2>
            <div class="overflow-x-auto">
                <table class="table">
                    <thead>
                        <tr>
                            <th>仓位</th>
                            <th>编码</th>
                            <th>名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="itemTableBody">
                        <!-- 表格内容将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 详细信息模态框 -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">详细信息</h3>
                <button id="closeDetailModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div id="detailContent" class="space-y-4">
                <!-- 详细信息将通过JavaScript动态生成 -->
            </div>
            <div class="mt-6 text-right">
                <button id="closeDetailBtn" class="btn btn-primary">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        // 返回按钮
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // 加载仓位数据
        function loadItems() {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const tableBody = document.getElementById('itemTableBody');
            
            tableBody.innerHTML = '';
            
            warehouseItems.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td contenteditable="true" data-field="location">${item.location}</td>
                    <td contenteditable="true" data-field="code">${item.code}</td>
                    <td contenteditable="true" data-field="name">${item.name}</td>
                    <td class="flex space-x-2">
                        <button class="text-primary hover:underline" onclick="viewDetail(${index})">
                            <i class="fa fa-eye"></i>
                        </button>
                        <button class="text-danger hover:underline" onclick="deleteItem(${index})">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
                
                // 添加编辑功能
                const editableCells = row.querySelectorAll('[contenteditable="true"]');
                editableCells.forEach(cell => {
                    cell.addEventListener('blur', function() {
                        const field = this.getAttribute('data-field');
                        const value = this.textContent;
                        updateItem(index, field, value);
                    });
                });
            });
        }

        // 更新项目
        function updateItem(index, field, value) {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            warehouseItems[index][field] = value;
            localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
        }

        // 查看详情
        function viewDetail(index) {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const item = warehouseItems[index];
            const detailContent = document.getElementById('detailContent');
            
            detailContent.innerHTML = `
                <div class="flex justify-between">
                    <span class="text-gray-600">仓位:</span>
                    <span class="font-medium">${item.location}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">编码:</span>
                    <span class="font-medium">${item.code}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">名称:</span>
                    <span class="font-medium">${item.name}</span>
                </div>
                ${item.image ? `
                    <div>
                        <span class="text-gray-600 block mb-2">图片:</span>
                        <img src="${item.image}" alt="${item.name}" class="w-full h-40 object-cover rounded-md">
                    </div>
                ` : ''}
            `;
            
            document.getElementById('detailModal').classList.remove('hidden');
        }

        // 删除项目
        function deleteItem(index) {
            if (confirm('确定要删除这个仓位吗？')) {
                const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
                warehouseItems.splice(index, 1);
                localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
                loadItems();
            }
        }

        // 手动录入表单提交
        document.getElementById('manualForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const location = document.getElementById('location').value;
            const code = document.getElementById('code').value;
            const name = document.getElementById('name').value;
            const imageInput = document.getElementById('image');
            
            if (!location || !code || !name) {
                alert('请填写必填字段');
                return;
            }
            
            let image = '';
            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image = e.target.result;
                    saveItem(location, code, name, image);
                };
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                saveItem(location, code, name, image);
            }
        });

        // 保存项目
        function saveItem(location, code, name, image) {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            warehouseItems.push({ location, code, name, image });
            localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
            
            // 清空表单
            document.getElementById('location').value = '';
            document.getElementById('code').value = '';
            document.getElementById('name').value = '';
            document.getElementById('image').value = '';
            
            // 重新加载列表
            loadItems();
        }

        // 二维码扫描
        let qrVideo = document.getElementById('qrVideo');
        let qrStream;

        document.getElementById('scanQrBtn').addEventListener('click', function() {
            document.getElementById('qrScanArea').classList.remove('hidden');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(s) {
                    qrStream = s;
                    qrVideo.srcObject = s;
                    qrVideo.setAttribute('playsinline', true);
                    qrVideo.play();
                    requestAnimationFrame(qrTick);
                })
                .catch(function(err) {
                    console.error('Error accessing camera:', err);
                    alert('无法访问摄像头');
                });
        });

        document.getElementById('stopQrScanBtn').addEventListener('click', function() {
            if (qrStream) {
                qrStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('qrScanArea').classList.add('hidden');
        });

        function qrTick() {
            if (qrVideo.readyState === qrVideo.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = qrVideo.videoWidth;
                canvas.height = qrVideo.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(qrVideo, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    // 解析二维码数据
                    const qrData = code.data;
                    const qrParts = qrData.split('|');
                    
                    if (qrParts.length >= 3) {
                        const location = qrParts[0];
                        const code = qrParts[1];
                        const name = qrParts[2];
                        
                        // 停止扫码
                        if (qrStream) {
                            qrStream.getTracks().forEach(track => track.stop());
                        }
                        document.getElementById('qrScanArea').classList.add('hidden');
                        
                        // 保存项目
                        saveItem(location, code, name, '');
                    } else {
                        alert('二维码格式不正确，应为：仓位|编码|名称');
                    }
                }
            }
            requestAnimationFrame(qrTick);
        }

        // 关闭详情模态框
        document.getElementById('closeDetailModal').addEventListener('click', function() {
            document.getElementById('detailModal').classList.add('hidden');
        });

        document.getElementById('closeDetailBtn').addEventListener('click', function() {
            document.getElementById('detailModal').classList.add('hidden');
        });

        // 加载数据
        loadItems();
    </script>
</body>
</html>
