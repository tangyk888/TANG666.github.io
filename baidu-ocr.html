<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度OCR通用文字识别</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6 transition-all duration-300 hover:shadow-lg hover:translate-y-[-2px];
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all duration-300 transform hover:scale-105 active:scale-95;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white transition-all duration-300;
            }
            .fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <button id="backBtn" class="mr-4 text-gray-400 hover:text-white">
                    <i class="fa fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-xl font-bold">YICHENGQIPEI</h1>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold">百度OCR通用文字识别</h1>
        </div>

        <!-- 识别卡片 -->
        <div class="card mb-8 fade-in">
            <div class="space-y-6">
                <!-- 图片上传 -->
                <div>
                    <label class="block text-gray-400 mb-2">上传图片</label>
                    <div class="border-2 border-dashed border-gray-700 rounded-lg p-8 text-center hover:border-primary transition-colors duration-300">
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <label for="imageInput" class="cursor-pointer">
                            <i class="fa fa-cloud-upload text-4xl text-gray-500 mb-4"></i>
                            <p class="text-gray-400">点击或拖拽图片到此处上传</p>
                        </label>
                        <div id="imagePreview" class="mt-4 hidden">
                            <img id="previewImage" src="" alt="预览图片" class="max-h-64 mx-auto rounded">
                        </div>
                    </div>
                </div>

                <!-- 识别按钮 -->
                <button id="recognizeBtn" class="btn btn-primary w-full">
                    <i class="fa fa-eye mr-2"></i>识别
                </button>

                <!-- 识别结果 -->
                <div id="resultContainer" class="hidden">
                    <h3 class="text-lg font-semibold mb-3">识别结果</h3>
                    <div class="bg-gray-800 p-4 rounded-lg min-h-40">
                        <pre id="recognitionResult" class="whitespace-pre-wrap text-sm"></pre>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // API配置信息
        const API_KEY = 'IWuZdXzexxFHbJwvidvfWcQT';
        const SECRET_KEY = 'aQMPy9B5A1GiZEGIMNDexPqe3TMgFRGM';
        const TOKEN_URL = 'https://aip.baidubce.com/oauth/2.0/token';
        const OCR_URL = 'https://aip.baidubce.com/rest/2.0/ocr/v1/general';

        // DOM元素
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImage = document.getElementById('previewImage');
        const recognizeBtn = document.getElementById('recognizeBtn');
        const resultContainer = document.getElementById('resultContainer');
        const recognitionResult = document.getElementById('recognitionResult');
        const backBtn = document.getElementById('backBtn');

        // 图片预览
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    imagePreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // 获取access_token
        async function getAccessToken() {
            const response = await fetch(`${TOKEN_URL}?grant_type=client_credentials&client_id=${API_KEY}&client_secret=${SECRET_KEY}`);
            const data = await response.json();
            return data.access_token;
        }

        // 识别文字
        recognizeBtn.addEventListener('click', async function() {
            const file = imageInput.files[0];
            if (!file) {
                alert('请先上传图片');
                return;
            }

            // 显示加载状态
            recognizeBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>识别中...';
            recognizeBtn.disabled = true;

            try {
                // 转换为Base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        // 移除data:image/xxx;base64,前缀
                        const base64String = e.target.result.split(',')[1];
                        resolve(base64String);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                // 获取access_token
                const accessToken = await getAccessToken();

                // 调用OCR API
                const response = await fetch(`${OCR_URL}?access_token=${accessToken}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `image=${encodeURIComponent(base64)}`
                });

                const data = await response.json();

                // 显示结果
                if (data.words_result) {
                    let resultText = '';
                    data.words_result.forEach(item => {
                        resultText += item.words + '\n';
                    });
                    recognitionResult.textContent = resultText;
                    resultContainer.classList.remove('hidden');
                } else {
                    recognitionResult.textContent = '识别失败: ' + (data.error_msg || '未知错误');
                    resultContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error('识别错误:', error);
                recognitionResult.textContent = '识别失败: ' + error.message;
                resultContainer.classList.remove('hidden');
            } finally {
                // 恢复按钮状态
                recognizeBtn.innerHTML = '<i class="fa fa-eye mr-2"></i>识别';
                recognizeBtn.disabled = false;
            }
        });

        // 返回按钮
        backBtn.addEventListener('click', function() {
            window.location.href = 'start-inventory.html';
        });
    </script>
</body>
</html>
